name: trpo

agent:
  firm_id: 5
  state_size: 3
  action_size: 20
  hidden_size: 64
  gamma: 0.99
  critic_lr: 0.001
  rollout_steps: 100
  gae_lambda: 0.95
  max_kl: 0.01
  damping: 0.01
  cg_iters: 10
  line_search_iters: 10
  line_search_decay: 0.5
  value_epochs: 10
  normalize_advantages: true
